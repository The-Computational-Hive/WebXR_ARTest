<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebXR AR Cube Prototype</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="hud">
      <h1>WebXR Wasp Assembly</h1>
      <p>Enter AR, tap once to place the aggregation, then step through the assembly sequence.</p>
      <div id="controls">
        <button id="btn-prev" type="button">Previous</button>
        <button id="btn-next" type="button">Next</button>
        <button id="btn-reset-step" type="button">Reset Step</button>
        <button id="btn-reset-placement" type="button">Reset Placement</button>
        <button id="btn-toggle-mode" type="button">Show All</button>
        <button id="btn-toggle-grid" type="button">Grid: On</button>
      </div>
      <div id="step-label">Part 0 / 0</div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
